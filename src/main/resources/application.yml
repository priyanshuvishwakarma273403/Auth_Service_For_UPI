server:
  port: 8081

spring:
  application:
    name: auth-service

  # MySQL Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/upi_auth_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:pop99558$$}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: AuthServiceHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update  # Production mein 'validate' use karo with Flyway
    show-sql: false     # Production mein false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:YourSuperSecretKeyHereMustBe256BitsLongForHS256AlgorithmSecurity}
  access-token-expiry: 900000   # 15 minutes
  refresh-token-expiry: 604800000  # 7 days

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://admin:admin123@localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always

# Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Logging
logging:
  level:
    com.upi.auth: DEBUG
    org.springframework.security: INFO